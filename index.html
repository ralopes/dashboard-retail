<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mid Pyramid Customers - Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', 'Roboto', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            background: white;
            border-radius: 16px;
            padding: 48px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            max-width: 400px;
            width: 100%;
        }

        .logo {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #FF5B00 0%, #E65100 100%);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: white;
            font-size: 28px;
            margin: 0 auto 24px;
        }

        h1 {
            font-size: 24px;
            font-weight: 600;
            color: #1A1A1A;
            text-align: center;
            margin-bottom: 8px;
        }

        p {
            font-size: 14px;
            color: #666666;
            text-align: center;
            margin-bottom: 32px;
        }

        .form-group {
            margin-bottom: 24px;
        }

        label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: #1A1A1A;
            margin-bottom: 8px;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #E5E7EB;
            border-radius: 8px;
            font-size: 16px;
            transition: all 0.2s ease;
        }

        input:focus {
            outline: none;
            border-color: #FF5B00;
            box-shadow: 0 0 0 3px rgba(255, 91, 0, 0.1);
        }

        button {
            width: 100%;
            padding: 14px;
            background: #FF5B00;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        button:hover {
            background: #E65100;
            transform: translateY(-1px);
            box-shadow: 0 4px 8px rgba(255, 91, 0, 0.3);
        }

        button:active {
            transform: translateY(0);
        }

        .error {
            background: #FEE2E2;
            color: #991B1B;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 24px;
            display: none;
        }

        .error.show {
            display: block;
            animation: shake 0.5s;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .footer {
            margin-top: 32px;
            text-align: center;
            font-size: 12px;
            color: #999999;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">I</div>
        <h1>Mid Pyramid Customers Retail & Telco</h1>
        <p>Acesso Restrito - Infobip</p>

        <div class="error" id="error">
            Senha incorreta. Tente novamente.
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label for="password">Senha</label>
                <input
                    type="password"
                    id="password"
                    placeholder="Digite a senha de acesso"
                    autocomplete="off"
                    required
                >
            </div>

            <button type="submit">Acessar Dashboard</button>
        </form>

        <div class="footer">
            &copy; 2026 Infobip - Dashboard Protegido
        </div>
    </div>

    <script>
        // CONFIGURAÇÃO DA SENHA
        // Para mudar a senha, altere o valor abaixo
        // Senha atual: "Infobip2026"
        // Para gerar nova senha hash, use: https://emn178.github.io/online-tools/sha256.html
        const SENHA_HASH = 'f8c3e7d8c8e5f8e7c8d5c8e5f8e7c8d5c8e5f8e7c8d5c8e5f8e7c8d5c8e5f8e7';

        // OU use a senha em texto puro (menos seguro, mas mais fácil)
        const SENHA_TEXTO = 'Infobip2026';

        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const senhaDigitada = document.getElementById('password').value;
            const errorDiv = document.getElementById('error');

            // Verificar senha
            if (senhaDigitada === SENHA_TEXTO) {
                // Salvar no sessionStorage (válido apenas enquanto navegador estiver aberto)
                sessionStorage.setItem('dashboard_autenticado', 'true');

                // Redirecionar para o dashboard
                window.location.href = 'dashboard.html';
            } else {
                // Mostrar erro
                errorDiv.classList.add('show');
                document.getElementById('password').value = '';

                // Remover erro depois de 3 segundos
                setTimeout(() => {
                    errorDiv.classList.remove('show');
                }, 3000);
            }
        });

        // Verificar se já está logado
        if (sessionStorage.getItem('dashboard_autenticado') === 'true') {
            window.location.href = 'dashboard.html';
        }
    </script>
</body>
</html>
